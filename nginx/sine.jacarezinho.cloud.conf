server {
    listen 80;
    server_name sine.jacarezinho.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sine.jacarezinho.cloud;

    root /opt/saas_sine/frontend/dist;
    index index.html;

    client_max_body_size 20M;
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    ssl_certificate /etc/letsencrypt/live/sine.jacarezinho.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sine.jacarezinho.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/sine.jacarezinho.cloud.access.log;
    error_log /var/log/nginx/sine.jacarezinho.cloud.error.log;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location /api/ {
        proxy_pass http://127.0.0.1:18743/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~ /\. {
        deny all;
    }

    location ~* \.(env|ini|log|sql|bak|backup)$ {
        deny all;
    }

    location / {
        try_files $uri /index.html;
    }
}
